# === Telegram ===
TG_BOT_TOKEN=""
TG_CHAT_ID=""

# === Timing ===
CHECK_INTERVAL=30             # seconds between health checks
LOG_STALE_MINUTES=10          # minutes of log silence → treated as hung
DISCONNECT_ALERT_MINUTES=15   # minutes disconnected (no restart, alert only)
STARTUP_TIMEOUT=90            # seconds to wait for ARO to confirm connected
RESET_STABLE_HOURS=2          # hours of stable uptime → reset retry counter

# === Restart Policy ===
MAX_RETRIES=5
BACKOFF_TIMES="30 60 120 300 600"   # seconds per retry attempt

# === Daily Report ===
DAILY_REPORT_HOUR=7           # 24h format, local time

# === ARO Binary ===
ARO_BINARY="/usr/bin/ARO"
